security:
  password_hashers:
    App\Entity\User: "auto"

  providers:
    app_user_provider:
      entity:
        class: App\Entity\User
        property: email

  firewalls:
    dev:
      pattern: ^/(_(profiler|wdt)|css|images|js)/
      security: false

    main:
      lazy: true
      provider: app_user_provider
      logout:
        path: app_logout
        target: app_home

  access_control:
    - { path: ^/login, roles: PUBLIC_ACCESS }
    - { path: ^/login/verify, roles: PUBLIC_ACCESS }
    - { path: ^/register, roles: PUBLIC_ACCESS }
    - { path: ^/register/verify, roles: PUBLIC_ACCESS }
    - { path: ^/events/new, roles: ROLE_USER }
    - { path: ^/events/\d+/edit, roles: ROLE_USER }
    - { path: ^/events/\d+/delete, roles: ROLE_USER }
    - { path: ^/events/\d+/register, roles: ROLE_USER }
    - { path: ^/events/\d+/checkout/success, roles: ROLE_USER }
    - { path: ^/events/\d+/unregister, roles: ROLE_USER }
